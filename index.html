<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://firebasestorage.googleapis.com/v0/b/dcit-web.appspot.com/o/a2main.css.css?alt=media&token=372ab3f9-ae18-4058-83ce-2253593a0555">

    <style>

        body{
            width:100%;
            margin-top:0;
            margin-bottom:0;
            margin-left:0;
            margin-right:0;

            padding-top:0;
            padding-bottom:0;
            padding-right:0;
            padding-left:0;
            background-color:#fafafa;
        }

        .primary-nav{
            height:90px;
            width:70vw;
            margin-top:5px;
            margin-left:auto;
            margin-right:auto;
            border: 1px solid #b5b5b5;
            border-radius:2px;
            padding-left:30px;
        }

        .user{
            width:18%;
            display:inline-block;

        }

        .parent{
            width:100%;

        }

        .user-story{
            text-align:center;
            margin:0;
            font-family:Lucida Sans Unicode;
            font-weight:100px;
            font-size: 12px;

        }


        .post-header{
    background-color:white;
    height:50px;
    padding:10px;
    border-bottom:1px solid #b5b5b5;
    display:flex;
    align-items:center;
    gap:10px;
}

.post-header img{
    width:30px;
    height:30px;
    border-radius:50%;
}

        .nav-bar{
            display:flex; /* display: block; */
            background-color:white;
            justify-content:space-between;
            width:100%;
            height:54px;
            border:1px solid #e5e5e5;
            padding: 0 20px;
        }

        #logo{
            height:35px;
        }

        #actions{
            height:35px;
        }

        #stories{
            width:70vw;
            margin:20px;
            background: white;
            border:1px solid #b5b5b5;
            padding:10px;

        }
        

        


        .search-box{
            height:25px;
            width:30vw;
            background-color:#fafafa;
            text-align:center;
            border:1px solid  #b5b5b5;
            border-radius:3px;
        }

        .action-image{
            height:40px;

        }

        .image-descendents{
            margin-top:5px;
            border-radius:50%;
            border:4px double #b5b5b5;
            width:56px;
            height:56px;
            display:block;
            margin-left:auto;
            margin-right:auto;
        }

        .post{
            
        border:1px solid #b5b5b5;
        border-radius:2px;
        width:560px;
        margin:20px auto;
        background:white;
        }

        .post-image{
            width:100%;
        }

        

        

        
    
      
    </style>
</head>
<body>
    <nav class="nav-bar">
       
        <img id="logo" src="img/instagran.png" alt="instagran logo" >
    
        <input type="text" placeholder="search"/>

        <img id="actions" src="img/actions.png" alt="actions" >
    </nav>

    <section id="stories">
        <div class="user" id="mydiv">
            <img class="image-descendents" src="img/gran1.jpg" >
            <p class="userstory">Elma</p>
        </div>
        <div class="user">
            <img class="image-descendents" src="img/gran2.jpg" >
            <p class="userstory">Betty</p>
        </div>
        <div class="user">
            <img class=" image-descendents" src="img/gran3.jpg" >
            <p class="userstory">Sandra</p>
        </div>
        <div class="user">
            <img class="image-descendents" src="img/gran4.jpg" >
            <p class="userstory">Delores</p>
        </div>

        <div class="user">
            <img class="image-descendents" src="img/gran5.jpg" >
            <p class="userstory">Karen</p>
        </div>
    </section>

    <section class="post">
        <div class="post-header">
            <img src="img/gran1.jpg"><span>Elma</span>
        </div>
        <div>
            <img class="post-image" src="https://www.placecage.com/g/512/512" alt="cage image">
        </div>
    </section>

    <footer></footer>
</body>
</html>
